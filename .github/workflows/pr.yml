name: PR Pipeline

on:
  pull_request:
    branches: [main]

jobs:
  # Stage 1 — TypeScript type check
  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: yarn type-check

  # Stage 2 — Next.js production build
  next-build:
    needs: type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: yarn build

  # Stage 3 — ESLint
  lint-check:
    needs: next-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: yarn lint

  # Stage 4 — Prettier format check
  format-check:
    needs: lint-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: yarn format:check

  # Stage 5 — Dependency vulnerability audit
  dependency-audit:
    needs: format-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - run: |
          # yarn v1 exit codes are a bitmask: 2=low, 4=moderate, 8=high, 16=critical
          # --level high only filters display, not the exit code — check bits manually
          # set +e prevents bash -e from aborting before we can inspect the exit code
          set +e; yarn audit --level high; EXIT=$?; set -e
          [ $((EXIT & 24)) -ne 0 ] && exit 1 || exit 0

  # Stage 6 — TruffleHog secrets scan
  secrets-scan:
    needs: dependency-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

  # Stage 7 — CodeQL static analysis (TypeScript)
  codeql-analysis:
    needs: secrets-scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: typescript
      - uses: github/codeql-action/analyze@v3
        with:
          category: /language:typescript
          output: sarif-results
          upload: always
      - name: Fail on Critical or High findings
        run: |
          count=$(python3 -c "
          import json, glob, sys
          total = sum(
              1 for f in glob.glob('sarif-results/*.sarif')
              for run in json.load(open(f)).get('runs', [])
              for result in run.get('results', [])
              if result.get('level') == 'error'
          )
          print(total)
          ")
          if [ "$count" -gt "0" ]; then
            echo "::error::CodeQL found $count Critical/High severity finding(s). Check the Security tab."
            exit 1
          fi

  # Stage 8 — Vitest unit tests with coverage (fails if any metric < 80%)
  unit-tests:
    needs: codeql-analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: yarn test
      - uses: davelosert/vitest-coverage-report-action@v2
        if: always()
        with:
          json-summary-path: ./coverage/coverage-summary.json
          json-final-path: ./coverage/coverage-final.json

  # Stage 9 — Vitest integration tests
  integration-tests:
    needs: unit-tests
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_TEST_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_TEST_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: yarn test:integration

  # Stage 10 — Playwright E2E tests (Chromium + WebKit)
  e2e-tests:
    needs: integration-tests
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_TEST_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_TEST_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: npx playwright install --with-deps chromium webkit
      - run: yarn test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots
          path: test-results/
          retention-days: 7

  # Stage 11 — Stryker mutation testing (runs on every PR)
  mutation-tests:
    needs: e2e-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: npx stryker run
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-report
          path: reports/mutation/
          retention-days: 14

  # Stage 12 — Claude Code AI review
  claude-code:
    needs: mutation-tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
