name: PR Pipeline

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

jobs:
  # Stage 1 — TypeScript type check
  type-check:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: yarn type-check

  # Stage 2 — Next.js production build
  next-build:
    if: github.event.action != 'closed'
    needs: type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: yarn build

  # Stage 3 — ESLint
  lint-check:
    if: github.event.action != 'closed'
    needs: next-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: yarn lint

  # Stage 4 — Prettier format check
  format-check:
    if: github.event.action != 'closed'
    needs: lint-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: yarn format:check

  # Stage 5 — Dependency vulnerability audit
  dependency-audit:
    if: github.event.action != 'closed'
    needs: format-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - run: yarn audit --level high

  # Stage 6 — TruffleHog secrets scan
  secrets-scan:
    if: github.event.action != 'closed'
    needs: dependency-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog-actions-scan@main
        with:
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}

  # Stage 7 — CodeQL static analysis (TypeScript)
  codeql-analysis:
    if: github.event.action != 'closed'
    needs: secrets-scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: typescript
      - uses: github/codeql-action/analyze@v3
        with:
          category: /language:typescript
          output: sarif-results
          upload: always
      - name: Fail on Critical or High findings
        run: |
          count=$(python3 -c "
          import json, glob, sys
          total = sum(
              1 for f in glob.glob('sarif-results/*.sarif')
              for run in json.load(open(f)).get('runs', [])
              for result in run.get('results', [])
              if result.get('level') == 'error'
          )
          print(total)
          ")
          if [ "$count" -gt "0" ]; then
            echo "::error::CodeQL found $count Critical/High severity finding(s). Check the Security tab."
            exit 1
          fi

  # Stage 8 — Vitest unit tests with coverage
  vitest:
    if: github.event.action != 'closed'
    needs: codeql-analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: yarn test --coverage
      - uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: true

  # Stage 9 — Playwright E2E tests (Chromium + WebKit)
  playwright:
    if: github.event.action != 'closed'
    needs: vitest
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_TEST_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_TEST_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: npx playwright install --with-deps chromium webkit
      - run: yarn test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots
          path: test-results/
          retention-days: 7

  # Stage 10 — Stryker mutation testing (runs on every PR)
  stryker:
    if: github.event.action != 'closed'
    needs: playwright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: npx stryker run
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-report
          path: reports/mutation/
          retention-days: 14

  # Stage 11 — Claude Code AI review
  claude-code:
    if: github.event.action != 'closed'
    needs: stryker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

  # Stage 12 — Vercel preview deployment
  vercel-preview:
    if: github.event.action != 'closed'
    needs: claude-code
    runs-on: ubuntu-latest
    outputs:
      preview_url: ${{ steps.deploy.outputs.preview_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - name: Deploy preview to Vercel
        id: deploy
        run: |
          PREVIEW_URL=$(npx vercel --token ${{ secrets.VERCEL_TOKEN }} --yes 2>&1 | grep -oE 'https://[^ ]+\.vercel\.app' | tail -1)
          echo "preview_url=$PREVIEW_URL" >> $GITHUB_OUTPUT
      - name: Post preview URL as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.deploy.outputs.preview_url }}';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Vercel Preview Deployment\n\n| | |\n|---|---|\n| **Preview URL** | ${previewUrl} |\n| **Branch** | \`${{ github.head_ref }}\` |\n| **Commit** | \`${{ github.event.pull_request.head.sha }}\` |`,
            });

  # Teardown — Remove Vercel preview on PR close/merge
  vercel-teardown:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - name: Remove Vercel preview deployment
        run: |
          npx vercel remove --token ${{ secrets.VERCEL_TOKEN }} --yes \
            $(npx vercel ls --token ${{ secrets.VERCEL_TOKEN }} | grep "${{ github.head_ref }}" | awk '{print $1}') \
            || echo "No preview deployment found to remove"
